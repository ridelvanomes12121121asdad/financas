<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor Histórico</title>
    <style>
        body { font-family: Arial; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; position: relative; }
        .num { position: absolute; left: -10px; top: -10px; background: #00e676; color: black; padding: 5px 10px; border-radius: 50%; font-weight: bold; }
        img { max-width: 100%; display: block; border-radius: 5px; margin: 10px 0; background: #000; }
        .footer { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #888; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📋 Histórico de Capturas</h1>
    <div class="grid" id="grid"></div>

    <script>
        const url = "https://bacbo-17c22-default-rtdb.asia-southeast1.firebasedatabase.app/historico";
        
        async function apagar(id) {
            if(confirm("Apagar do banco?")) {
                await fetch(`${url}/${id}.json`, { method: 'DELETE' });
                carregar();
            }
        }

        async function carregar() {
            try {
                const res = await fetch(`${url}.json`);
                const dados = await res.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = "";
                if(!dados) return;

                // Transforma em lista e inverte (mais novos primeiro)
                const itens = Object.keys(dados).map(k => ({id: k, ...dados[k]})).reverse();

                itens.forEach((item, i) => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="num">${itens.length - i}</div>
                        <img src="${item.imagem}">
                        <div class="footer">
                            <span>🕒 ${item.timestamp}</span>
                            <button class="btn-del" onclick="apagar('${item.id}')">Apagar</button>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } catch(e) {}
        }

        setInterval(carregar, 2000);
        carregar();
    </script>
</body>
</html>
