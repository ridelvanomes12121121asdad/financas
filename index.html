<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
            padding: 30px 25px;
            margin-top: 20px;
        }

        /* ---- Status do programa ---- */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }

        .status-label {
            font-weight: 500;
            color: #334155;
            font-size: 0.9rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
        }

        .status-dot.offline {
            background: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
        }

        .status-text.online {
            color: #16a34a;
        }

        .status-text.offline {
            color: #dc2626;
        }

        /* ---- BOTÃO DESLIGAR ---- */
        .header-control {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 20px 20px 18px;
            text-align: center;
            margin-bottom: 32px;
            border: 1px solid #e2e8f0;
        }

        .header-control h3 {
            font-weight: 500;
            font-size: 1.1rem;
            color: #334155;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .btn-off {
            background: #dc2626;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(220, 38, 38, 0.25);
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-off:hover {
            background: #b91c1c;
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(220, 38, 38, 0.35);
        }

        .btn-off:active {
            transform: scale(0.96);
        }

        /* ---- Valor Inicial ---- */
        .valor-inicial {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 20px 20px 18px;
            margin-bottom: 32px;
            border: 2px solid #e2e8f0;
            transition: border-color 0.3s;
        }

        .valor-inicial:hover {
            border-color: #94a3b8;
        }

        .valor-inicial .label-destaque {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .valor-inicial .label-destaque span {
            font-weight: 600;
            font-size: 1rem;
            color: #0f172a;
            background: #e2e8f0;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .valor-inicial .label-destaque h3 {
            font-weight: 500;
            font-size: 1.1rem;
            color: #0f172a;
        }

        .valor-inicial .linha-valor {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .valor-inicial .linha-valor input {
            flex: 1;
            min-width: 150px;
            padding: 12px 16px;
            border-radius: 60px;
            border: 2px solid #d1d9e6;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            background: white;
            outline: none;
            transition: all 0.2s;
            text-align: center;
        }

        .valor-inicial .linha-valor input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .valor-inicial .linha-valor input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .valor-inicial .linha-valor button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .valor-inicial .linha-valor button:hover {
            background: #1e293b;
            transform: scale(1.02);
        }

        .valor-inicial .linha-valor button:active {
            transform: scale(0.96);
        }

        .valor-inicial .valor-atual {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: white;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }

        .valor-inicial .valor-atual .rotulo {
            font-size: 0.85rem;
            color: #64748b;
        }

        .valor-inicial .valor-atual .numero {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
            background: #f1f5f9;
            padding: 2px 18px;
            border-radius: 40px;
            min-width: 80px;
            text-align: center;
        }

        .valor-inicial .valor-atual .numero.destaque {
            background: #dbeafe;
            color: #1d4ed8;
            border: 2px solid #93c5fd;
        }

        /* ---- Galeria ---- */
        .galeria {
            margin: 10px 0 25px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card-imagem {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px 16px 14px;
            border: 1px solid #e9edf2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: 0.15s;
        }

        .card-imagem:hover {
            border-color: #cbd5e1;
        }

        .card-imagem .legenda {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
        }

        .card-imagem .legenda span {
            background: #e9edf2;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #1e293b;
        }

        .card-imagem img {
            width: 100%;
            border-radius: 16px;
            display: block;
            background: #e2e8f0;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
        }

        .card-imagem img:hover {
            transform: scale(1.01);
        }

        .sem-imagem {
            text-align: center;
            padding: 30px 10px;
            color: #94a3b8;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 0.95rem;
        }

        /* ---- Senha ---- */
        .senha-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(2px);
        }

        .senha-box {
            background: white;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 40px 60px -20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }

        .senha-box h2 {
            font-weight: 500;
            color: #0f172a;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .senha-box input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 60px;
            border: 1px solid #d1d9e6;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 18px;
            outline: none;
        }

        .senha-box input:focus {
            border-color: #3b82f6;
        }

        .senha-box button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.15s;
        }

        .senha-box button:hover {
            background: #1e293b;
        }

        .senha-erro {
            color: #dc2626;
            margin-top: 12px;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .container { padding: 16px; }
            .valor-inicial .linha-valor input { min-width: 100px; }
            .valor-inicial .linha-valor button { padding: 10px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- TELA DE SENHA -->
    <div class="senha-overlay" id="senhaOverlay">
        <div class="senha-box">
            <h2>🔐 Acesso Restrito</h2>
            <input type="password" id="senhaInput" placeholder="Digite a senha" autofocus>
            <button onclick="verificarSenha()">Entrar</button>
            <div id="senhaErro" class="senha-erro"></div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="conteudoPrincipal" style="display:none; width:100%; max-width:700px;">

        <div class="container">

            <!-- STATUS DO PROGRAMA -->
            <div class="status-bar">
                <span class="status-label">📡 Monitoramento</span>
                <div class="status-indicator">
                    <span class="status-dot offline" id="statusDot"></span>
                    <span class="status-text offline" id="statusText">Offline</span>
                </div>
            </div>

            <!-- BOTÃO DESLIGAR -->
            <div class="header-control">
                <h3>🔌 Controle Remoto</h3>
                <button class="btn-off" onclick="enviarComandoDesligar()">
                    ⚡ DESLIGAR COMPUTADOR
                </button>
            </div>

            <!-- VALOR INICIAL -->
            <div class="valor-inicial">
                <div class="label-destaque">
                    <h3>📊 Valor de Referência</h3>
                    <span>Início</span>
                </div>
                <div class="linha-valor">
                    <input type="number" id="valorInicialInput" placeholder="Digite um valor" step="any">
                    <button onclick="definirValorInicial()">Definir</button>
                </div>
                <div class="valor-atual">
                    <span class="rotulo">Valor atual:</span>
                    <span class="numero" id="valorAtualDisplay">—</span>
                </div>
            </div>

            <!-- GALERIA -->
            <h2 style="font-weight:500; font-size:1.2rem; color:#0f172a;">📸 Última Captura</h2>
            <p style="color:#64748b; font-size:0.85rem; margin-bottom:12px;">Imagem mais recente do monitoramento</p>

            <div class="galeria" id="galeriaContainer">
                <div class="sem-imagem">Nenhuma imagem disponível.</div>
            </div>

        </div>
    </div>

    <script>
        const SENHA_CORRETA = "Dellplay321#";
        const URL_FIREBASE = "https://bacbo-17c22-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let valorInicial = null;

        // -------- SENHA --------
        function verificarSenha() {
            const input = document.getElementById('senhaInput');
            const erro = document.getElementById('senhaErro');
            if (input.value === SENHA_CORRETA) {
                document.getElementById('senhaOverlay').style.display = 'none';
                document.getElementById('conteudoPrincipal').style.display = 'block';
                carregarValorInicial();
                carregarUltimaImagem();
                verificarStatus();
                setInterval(() => {
                    carregarUltimaImagem();
                    verificarStatus();
                }, 3000);
            } else {
                erro.textContent = 'Senha incorreta. Tente novamente.';
                input.value = '';
                input.focus();
            }
        }

        document.getElementById('senhaInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verificarSenha();
        });

        // -------- STATUS --------
        async function verificarStatus() {
            try {
                const res = await fetch(URL_FIREBASE + "status.json");
                const data = await res.json();
                const online = data && data.online === true;
                atualizarStatusUI(online);
            } catch (e) {
                atualizarStatusUI(false);
            }
        }

        function atualizarStatusUI(online) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (online) {
                dot.className = 'status-dot online';
                text.className = 'status-text online';
                text.textContent = 'Online';
            } else {
                dot.className = 'status-dot offline';
                text.className = 'status-text offline';
                text.textContent = 'Offline';
            }
        }

        // -------- DESLIGAR --------
        async function enviarComandoDesligar() {
            if (confirm("⚠️ Deseja realmente DESLIGAR o computador remotamente?")) {
                try {
                    await fetch(URL_FIREBASE + "comando.json", {
                        method: 'PATCH',
                        body: JSON.stringify({ desligar: true })
                    });
                    alert("✅ Comando enviado! O PC será desligado em 10 segundos.");
                } catch (e) {
                    alert("Erro ao enviar comando.");
                }
            }
        }

        // -------- VALOR INICIAL --------
        function definirValorInicial() {
            const input = document.getElementById('valorInicialInput');
            const valor = parseFloat(input.value);
            
            if (isNaN(valor)) {
                alert("Por favor, digite um número válido.");
                return;
            }

            valorInicial = valor;
            
            // Salva no localStorage para persistir
            localStorage.setItem('valorInicial', JSON.stringify(valorInicial));
            
            // Atualiza a interface
            atualizarDisplayValor();
            
            // Mostra feedback
            const display = document.getElementById('valorAtualDisplay');
            display.classList.add('destaque');
            setTimeout(() => display.classList.remove('destaque'), 800);
            
            input.value = '';
        }

        function carregarValorInicial() {
            const salvo = localStorage.getItem('valorInicial');
            if (salvo) {
                valorInicial = JSON.parse(salvo);
                atualizarDisplayValor();
            }
        }

        function atualizarDisplayValor() {
            const display = document.getElementById('valorAtualDisplay');
            if (valorInicial !== null && valorInicial !== undefined) {
                display.textContent = valorInicial;
            } else {
                display.textContent = '—';
            }
        }

        // -------- CARREGAR ÚLTIMA IMAGEM --------
        async function carregarUltimaImagem() {
            const container = document.getElementById('galeriaContainer');
            try {
                const res = await fetch(URL_FIREBASE + "historico.json?orderBy=\"timestamp\"&limitToLast=1");
                const dados = await res.json();

                if (!dados) {
                    container.innerHTML = `<div class="sem-imagem">Nenhuma imagem disponível.</div>`;
                    return;
                }

                const keys = Object.keys(dados);
                if (keys.length === 0) {
                    container.innerHTML = `<div class="sem-imagem">Nenhuma imagem disponível.</div>`;
                    return;
                }

                const ultimaImagem = dados[keys[0]];
                if (!ultimaImagem || !ultimaImagem.imagem) {
                    container.innerHTML = `<div class="sem-imagem">Nenhuma imagem disponível.</div>`;
                    return;
                }

                const timestamp = ultimaImagem.timestamp || 'sem data';
                let isRecente = false;
                if (ultimaImagem.timestamp) {
                    const partes = ultimaImagem.timestamp.match(/(\d{2})\/(\d{2})\/(\d{4}),\s*(\d{2}):(\d{2}):(\d{2})/);
                    if (partes) {
                        const dataUltima = new Date(
                            parseInt(partes[3]), parseInt(partes[2]) - 1, parseInt(partes[1]),
                            parseInt(partes[4]), parseInt(partes[5]), parseInt(partes[6])
                        );
                        const diff = (new Date() - dataUltima) / 1000 / 60;
                        if (diff < 5) isRecente = true;
                    }
                }

                const html = `
                    <div class="card-imagem">
                        <div class="legenda">
                            <span style="background:${isRecente ? '#d1fae5' : '#dbeafe'};">
                                ${isRecente ? '🟢 Recente' : '📌 Última captura'}
                            </span>
                            <span>🕒 ${timestamp}</span>
                        </div>
                        <img src="${ultimaImagem.imagem}" alt="Última captura" loading="lazy">
                    </div>
                `;
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div class="sem-imagem">Erro ao carregar imagem.</div>`;
            }
        }

        // -------- Inicializa --------
        document.addEventListener('DOMContentLoaded', () => {
            carregarValorInicial();
        });

        // Permite definir valor com Enter
        document.getElementById('valorInicialInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') definirValorInicial();
        });
    </script>

</body>
</html>
